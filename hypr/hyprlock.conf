# password input
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    outer_color = $textColor
    inner_color = $background
    font_color = $textColor

    placeholder_text = Password

    check_color= rgba(00ff99ee)
    fail_color= rgba(ff6633ee)

    fade_on_empty = false
    rounding = 40

    position = 0, -160
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "<b>$(date +"%A, %B %d")</b>"
  color = $textColor
  font_size = 30
  font_family = JetBrainsMono Nerd Font 10
  position = 0, 150
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 1
  shadow_boost = $shadowBoost
  shadow_color = $shadowColor
}

label {
  monitor = 
  text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
  color = $textColor
  font_size = 93
  font_family = JetBrainsMono Nerd Font 10
  position = 0, 50
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 2
  shadow_boost = $shadowBoost
  shadow_color = $shadowColor
}
