
source = ~/.cache/wal/colors-hyprland.conf
$textColor = $foreground
$shadowColor = $background
$shadowBoost = 0.9

# wallpaper
background {
    monitor =
    color = $background
    path = $wallpaper
    blur_passes = 4
    blur_size = 5
}

